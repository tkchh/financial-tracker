{% extends "base.html" %}
{% block content %}
<h2>Удалить «{{ object }}»?</h2>
<p class="item-meta">Это действие нельзя отменить.</p>
<form method="post">{% csrf_token %}
  <button type="submit" class="btn-danger">Удалить</button>
  <a class="link-btn" href="javascript:history.back()">Отмена</a>
</form>
{% endblock %}
